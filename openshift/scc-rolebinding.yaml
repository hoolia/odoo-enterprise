# Grants the odoo ServiceAccount the privileged SCC.
# Required because:
#   - Init container runs as root (uid 0) to fix PVC ownership
#   - Main container runs as uid 999 (odoo)
# If your cluster uses a less permissive SCC (e.g. anyuid), adjust
# the clusterRole reference accordingly.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: odoo-privileged
  labels:
    app.kubernetes.io/name: odoo
    app.kubernetes.io/instance: odoo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
  - kind: ServiceAccount
    name: odoo
