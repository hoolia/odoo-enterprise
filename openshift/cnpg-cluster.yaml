# CloudNativePG (CNPG) PostgreSQL cluster.
# Requires the CNPG operator to be installed on the cluster.
# Creates:
#   - A 3-instance Postgres 16 HA cluster
#   - Service "postgres-rw" (read-write endpoint)
#   - Secret "postgres-app" with connection credentials
#
# The Odoo deployment references these resources automatically.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: odoo
    app.kubernetes.io/instance: odoo
    app.kubernetes.io/component: database
spec:
  instances: 3
  postgresql:
    parameters:
      max_connections: "200"
      shared_buffers: 256MB
      effective_cache_size: 768MB
      maintenance_work_mem: 128MB
      work_mem: 4MB
  bootstrap:
    initdb:
      database: odoo
      owner: odoo
  backup:
    barmanObjectStore:
      destinationPath: s3://cnpg-barman-backups/odoo/
      endpointURL: https://s3.gra.io.cloud.ovh.net
      s3Credentials:
        accessKeyId:
          key: AWS_ACCESS_KEY_ID
          name: s3-backup-credentials
        secretAccessKey:
          key: AWS_SECRET_ACCESS_KEY
          name: s3-backup-credentials
    retentionPolicy: 30d
    target: prefer-standby
  storage:
    size: 10Gi
  resources:
    requests:
      cpu: "1"
      memory: 2Gi
    limits:
      cpu: "2"
      memory: 4Gi
