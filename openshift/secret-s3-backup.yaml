# S3 credentials for CNPG Barman backups.
# Used when no ObjectBucketClaim provisioner is available.
# Replace the values below with your S3-compatible credentials.
apiVersion: v1
kind: Secret
metadata:
  name: s3-backup-credentials
  labels:
    app.kubernetes.io/name: odoo
    app.kubernetes.io/instance: odoo
    app.kubernetes.io/component: backup
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: changeme
  AWS_SECRET_ACCESS_KEY: changeme
