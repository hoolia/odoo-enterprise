apiVersion: apps/v1
kind: Deployment
metadata:
  name: odoo
  labels:
    app.kubernetes.io/name: odoo
    app.kubernetes.io/instance: odoo
    app.kubernetes.io/component: server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: odoo
      app.kubernetes.io/instance: odoo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: odoo
        app.kubernetes.io/instance: odoo
        app.kubernetes.io/component: server
    spec:
      serviceAccountName: odoo
      # Init container runs as root to fix PVC ownership for uid 999
      initContainers:
        - name: volume-permissions
          image: registry.access.redhat.com/ubi9/ubi-minimal:latest
          command:
            - sh
            - -c
            - |
              chown -R 999:0 /bitnami/odoo
              chmod -R g+rwX /bitnami/odoo
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: odoo-data
              mountPath: /bitnami/odoo
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      containers:
        - name: odoo
          image: image-registry.openshift-image-registry.svc:5000/odoo/odoo-enterprise:latest
          ports:
            - name: http
              containerPort: 8069
              protocol: TCP
          env:
            # Database connection — assumes CNPG cluster named "postgres"
            # which creates a service "postgres-rw" in the same namespace
            - name: ODOO_DATABASE_HOST
              value: postgres-rw
            - name: ODOO_DATABASE_PORT_NUMBER
              value: "5432"
            - name: ODOO_DATABASE_NAME
              value: odoo
            - name: ODOO_DATABASE_USER
              value: odoo
            # Database password from CNPG-generated secret
            - name: ODOO_DATABASE_PASSWORD_FILE
              value: /opt/bitnami/odoo/secrets/password
            # Odoo admin password
            - name: ODOO_PASSWORD_FILE
              value: /opt/bitnami/odoo/secrets/odoo-password
            # Application settings
            - name: ODOO_EMAIL
              value: odoo@example.com
            - name: ODOO_SKIP_BOOTSTRAP
              value: "no"
            - name: ODOO_LOAD_DEMO_DATA
              value: "no"
          volumeMounts:
            - name: odoo-data
              mountPath: /bitnami/odoo
            - name: odoo-secrets
              mountPath: /opt/bitnami/odoo/secrets
              readOnly: true
          resources:
            requests:
              cpu: "6"
              memory: 12Gi
            limits:
              cpu: "9"
              memory: 18Gi
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 600
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet:
              path: /web/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          securityContext:
            runAsUser: 999
            runAsGroup: 0
      volumes:
        - name: odoo-data
          persistentVolumeClaim:
            claimName: odoo
        - name: odoo-secrets
          projected:
            sources:
              # CNPG postgres-app secret (auto-generated by CNPG operator)
              - secret:
                  name: postgres-app
                  items:
                    - key: password
                      path: password
              # Odoo admin password secret
              - secret:
                  name: odoo
                  items:
                    - key: odoo-password
                      path: odoo-password
